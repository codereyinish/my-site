<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
    <script>window.CMS_MANUAL_INIT = true;</script>

    <script>
      // ── Visible debug overlay ──────────────────────────────────────────────
      // Shows what the auth code is doing in real-time (bottom-right corner).
      function authLog(msg) {
        let el = document.getElementById('auth-log');
        if (!el) {
          el = document.createElement('div');
          el.id = 'auth-log';
          el.style.cssText = [
            'position:fixed','bottom:10px','right:10px','z-index:99999',
            'background:rgba(0,0,0,0.85)','color:#0f0','font-family:monospace',
            'font-size:11px','padding:10px 14px','border-radius:8px',
            'max-width:440px','max-height:220px','overflow:auto',
            'line-height:1.6','pointer-events:none',
          ].join(';');
          document.body ? document.body.appendChild(el) : document.addEventListener('DOMContentLoaded', () => document.body.appendChild(el));
        }
        const t = new Date().toISOString().slice(11,19);
        el.innerHTML += `<div>${t} ${msg}</div>`;
        el.scrollTop = el.scrollHeight;
      }

      const AUTH_KEY = 'decap-auth-token';

      function dispatchAuthMsg(msg) {
        authLog('→ dispatching message to CMS…');
        window.dispatchEvent(new MessageEvent('message', {
          data: msg,
          origin: window.location.origin,
        }));
        authLog('✓ message dispatched');
      }

      // A) Check localStorage on load (covers redirect-based flow where page reloaded)
      const pendingToken = localStorage.getItem(AUTH_KEY);
      if (pendingToken) {
        authLog('found stored token, waiting for CMS listener…');
        localStorage.removeItem(AUTH_KEY);
        // Delay to let Decap CMS load and register its message listener
        setTimeout(() => dispatchAuthMsg(pendingToken), 2500);
      }

      // B) BroadcastChannel: popup sends token, we forward to CMS
      if ('BroadcastChannel' in window) {
        authLog('BroadcastChannel: listening');
        const bc = new BroadcastChannel('decap-auth');
        bc.onmessage = (e) => {
          authLog('BroadcastChannel: message received!');
          dispatchAuthMsg(e.data);
          bc.close();
        };
      } else {
        authLog('BroadcastChannel: NOT supported');
      }

      // C) storage event: fires here when another tab/popup writes localStorage
      window.addEventListener('storage', (e) => {
        if (e.key === AUTH_KEY && e.newValue) {
          authLog('storage event: token received!');
          localStorage.removeItem(AUTH_KEY);
          dispatchAuthMsg(e.newValue);
        }
      });

      // D) Intercept postMessage: log every incoming message so we can see what CMS receives
      window.addEventListener('message', (e) => {
        if (typeof e.data === 'string' && e.data.startsWith('authorization:')) {
          authLog('✅ auth message received from origin: ' + e.origin);
        }
      });

      // E) window.open interceptor — if we already have a stored token, inject it
      // immediately when CMS opens the popup (CMS registers its listener right before)
      const _origOpen = window.open.bind(window);
      window.open = function(url, name, features) {
        authLog('window.open: ' + name + ' → ' + (url || '').slice(0, 60));
        if (name === 'netlify-cms-auth' || (typeof url === 'string' && url.includes('/api/auth'))) {
          const stored = localStorage.getItem(AUTH_KEY);
          if (stored) {
            authLog('stored token found, injecting…');
            localStorage.removeItem(AUTH_KEY);
            setTimeout(() => dispatchAuthMsg(stored), 80);
            const fake = { closed: false, location: { href: url }, close() { this.closed = true; } };
            setTimeout(() => { fake.closed = true; }, 3000);
            return fake;
          }
        }
        return _origOpen(url, name, features);
      };
    </script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'codereyinish/my-site',
            branch: 'main',
            base_url: 'https://my-site-nine-dun.vercel.app',
            auth_endpoint: '/api/auth',
          },
          media_folder: 'public/blog',
          public_folder: '/blog',
          collections: [
            {
              name: 'blog',
              label: 'Blog Posts',
              label_singular: 'Blog Post',
              folder: 'src/content/blog',
              create: true,
              delete: true,
              extension: 'md',
              format: 'frontmatter',
              slug: '{{slug}}',
              fields: [
                { label: 'Title', name: 'title', widget: 'string' },
                { label: 'Description', name: 'description', widget: 'string' },
                { label: 'Publish Date', name: 'pubDate', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false },
                { label: 'Updated Date', name: 'updatedDate', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false, required: false },
                { label: 'Thumbnail', name: 'heroImage', widget: 'image', required: false, media_folder: '/public/blog', public_folder: '/blog' },
                { label: 'Tags', name: 'tags', widget: 'list', required: false },
                { label: 'Body', name: 'body', widget: 'markdown' },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
