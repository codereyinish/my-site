<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
    <script>window.CMS_MANUAL_INIT = true;</script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'codereyinish/my-site',
            branch: 'main',
            base_url: 'https://my-site-nine-dun.vercel.app',
            auth_endpoint: '/api/auth',
          },
          media_folder: 'public/blog',
          public_folder: '/blog',
          collections: [
            {
              name: 'blog',
              label: 'Blog Posts',
              label_singular: 'Blog Post',
              folder: 'src/content/blog',
              create: true,
              delete: true,
              extension: 'md',
              format: 'frontmatter',
              slug: '{{slug}}',
              fields: [
                {
                  label: 'Title',
                  name: 'title',
                  widget: 'string',
                  hint: 'The post title — shown as the big heading',
                },
                {
                  label: 'Description',
                  name: 'description',
                  widget: 'string',
                  hint: 'One-line summary shown on cards and in search results',
                },
                {
                  label: 'Publish Date',
                  name: 'pubDate',
                  widget: 'datetime',
                  date_format: 'YYYY-MM-DD',
                  time_format: false,
                },
                {
                  label: 'Updated Date',
                  name: 'updatedDate',
                  widget: 'datetime',
                  date_format: 'YYYY-MM-DD',
                  time_format: false,
                  required: false,
                  hint: 'Optional — only fill if you update the post later',
                },
                {
                  label: 'Thumbnail',
                  name: 'heroImage',
                  widget: 'image',
                  required: false,
                  media_folder: '/public/blog',
                  public_folder: '/blog',
                  hint: 'Cover image shown on cards and at the top of the post',
                },
                {
                  label: 'Tags',
                  name: 'tags',
                  widget: 'list',
                  required: false,
                  hint: 'e.g. AI, Building, Python',
                },
                {
                  label: 'Body',
                  name: 'body',
                  widget: 'markdown',
                },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
