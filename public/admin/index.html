<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
    <script>window.CMS_MANUAL_INIT = true;</script>

    <script>
      // ── Safari-compatible OAuth token receiver ──────────────────────────────
      // Problem: Safari kills window.opener after the popup visits GitHub
      // (a cross-origin site), so the standard postMessage can't get back.
      //
      // Solution: store the token in localStorage in callback.js, then use
      // three mechanisms to inject it into Decap CMS as soon as it's listening:
      //
      //  A) BroadcastChannel  – popup is alive, opener is dead  (Safari popup)
      //  B) storage event     – another tab wrote localStorage  (any redirect)
      //  C) window.open hook  – page reloaded with a stored token (redirect fallback)

      const AUTH_KEY = 'decap-auth-token';

      function dispatchAuthMsg(msg) {
        window.dispatchEvent(new MessageEvent('message', {
          data: msg,
          origin: window.location.origin,
        }));
      }

      // A) BroadcastChannel: popup sends message, we forward it to CMS
      //    Also store in localStorage in case CMS isn't listening yet.
      if ('BroadcastChannel' in window) {
        const bc = new BroadcastChannel('decap-auth');
        bc.onmessage = (e) => {
          localStorage.setItem(AUTH_KEY, e.data); // backup
          dispatchAuthMsg(e.data);
          bc.close();
        };
      }

      // B) storage event: fires in THIS tab when ANOTHER tab/popup writes localStorage
      window.addEventListener('storage', (e) => {
        if (e.key === AUTH_KEY && e.newValue) {
          localStorage.removeItem(AUTH_KEY);
          dispatchAuthMsg(e.newValue);
        }
      });

      // C) window.open hook: when CMS opens the OAuth popup, Decap CMS has JUST
      //    registered its message listener. If we have a stored token from a
      //    previous redirect, inject it immediately instead of going through OAuth again.
      const _origOpen = window.open;
      window.open = function(url, name, features) {
        if (name === 'netlify-cms-auth' || (typeof url === 'string' && url.includes('/api/auth'))) {
          const stored = localStorage.getItem(AUTH_KEY);
          if (stored) {
            localStorage.removeItem(AUTH_KEY);
            // CMS just registered its listener — dispatch after a tiny delay
            setTimeout(() => dispatchAuthMsg(stored), 50);
            // Return a fake window so CMS doesn't throw; mark it closed quickly
            // so CMS's "popup closed" interval doesn't fire an error first.
            const fake = { closed: false, location: { href: url }, close() { this.closed = true; } };
            setTimeout(() => { fake.closed = true; }, 2000);
            return fake;
          }
        }
        return _origOpen.apply(this, arguments);
      };
    </script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'codereyinish/my-site',
            branch: 'main',
            base_url: 'https://my-site-nine-dun.vercel.app',
            auth_endpoint: '/api/auth',
          },
          media_folder: 'public/blog',
          public_folder: '/blog',
          collections: [
            {
              name: 'blog',
              label: 'Blog Posts',
              label_singular: 'Blog Post',
              folder: 'src/content/blog',
              create: true,
              delete: true,
              extension: 'md',
              format: 'frontmatter',
              slug: '{{slug}}',
              fields: [
                {
                  label: 'Title',
                  name: 'title',
                  widget: 'string',
                  hint: 'The post title — shown as the big heading',
                },
                {
                  label: 'Description',
                  name: 'description',
                  widget: 'string',
                  hint: 'One-line summary shown on cards and in search results',
                },
                {
                  label: 'Publish Date',
                  name: 'pubDate',
                  widget: 'datetime',
                  date_format: 'YYYY-MM-DD',
                  time_format: false,
                },
                {
                  label: 'Updated Date',
                  name: 'updatedDate',
                  widget: 'datetime',
                  date_format: 'YYYY-MM-DD',
                  time_format: false,
                  required: false,
                  hint: 'Optional — only fill if you update the post later',
                },
                {
                  label: 'Thumbnail',
                  name: 'heroImage',
                  widget: 'image',
                  required: false,
                  media_folder: '/public/blog',
                  public_folder: '/blog',
                  hint: 'Cover image shown on cards and at the top of the post',
                },
                {
                  label: 'Tags',
                  name: 'tags',
                  widget: 'list',
                  required: false,
                  hint: 'e.g. AI, Building, Python',
                },
                {
                  label: 'Body',
                  name: 'body',
                  widget: 'markdown',
                },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
