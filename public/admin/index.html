<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
    <script>window.CMS_MANUAL_INIT = true;</script>

    <script>
      // Decap CMS netlify-auth.js requires a two-step handshake from the OAuth popup:
      //   1. "authorizing:github"                          → parent registers success listener
      //   2. "authorization:github:success:{token,...}"   → parent logs in
      // This script handles all three delivery paths (Chrome, Safari, redirect).

      const AUTH_KEY = 'decap-auth-token';

      function dispatchAuthMsg(successMsg) {
        // Step 1: handshake
        window.dispatchEvent(new MessageEvent('message', {
          data: 'authorizing:github',
          origin: window.location.origin,
        }));
        // Step 2: token (after listener is registered)
        setTimeout(() => {
          window.dispatchEvent(new MessageEvent('message', {
            data: successMsg,
            origin: window.location.origin,
          }));
        }, 50);
      }

      // Path A: page reloaded after redirect-based OAuth (Safari main-window flow)
      const pendingToken = localStorage.getItem(AUTH_KEY);
      if (pendingToken) {
        localStorage.removeItem(AUTH_KEY);
        setTimeout(() => dispatchAuthMsg(pendingToken), 2500);
      }

      // Path B: BroadcastChannel — popup sends token after Safari killed window.opener
      if ('BroadcastChannel' in window) {
        const bc = new BroadcastChannel('decap-auth');
        bc.onmessage = (e) => { dispatchAuthMsg(e.data); bc.close(); };
      }

      // Path C: storage event — popup wrote localStorage while this tab was open
      window.addEventListener('storage', (e) => {
        if (e.key === AUTH_KEY && e.newValue) {
          localStorage.removeItem(AUTH_KEY);
          dispatchAuthMsg(e.newValue);
        }
      });

      // Path D: window.open interceptor — if token already stored, skip the popup entirely
      const _origOpen = window.open.bind(window);
      window.open = function(url, name, features) {
        if (name === 'Netlify Authorization' || (typeof url === 'string' && url.includes('/api/auth'))) {
          const stored = localStorage.getItem(AUTH_KEY);
          if (stored) {
            localStorage.removeItem(AUTH_KEY);
            setTimeout(() => dispatchAuthMsg(stored), 80);
            const fake = { closed: false, location: { href: url }, close() { this.closed = true; } };
            setTimeout(() => { fake.closed = true; }, 3000);
            return fake;
          }
        }
        return _origOpen(url, name, features);
      };
    </script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'codereyinish/my-site',
            branch: 'main',
            base_url: 'https://my-site-nine-dun.vercel.app',
            auth_endpoint: '/api/auth',
          },
          media_folder: 'public/blog',
          public_folder: '/blog',
          collections: [
            {
              name: 'blog',
              label: 'Blog Posts',
              label_singular: 'Blog Post',
              folder: 'src/content/blog',
              create: true,
              delete: true,
              extension: 'md',
              format: 'frontmatter',
              slug: '{{slug}}',
              fields: [
                { label: 'Title', name: 'title', widget: 'string', hint: 'The post title — shown as the big heading' },
                { label: 'Description', name: 'description', widget: 'string', hint: 'One-line summary shown on cards and in search results' },
                { label: 'Publish Date', name: 'pubDate', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false },
                { label: 'Updated Date', name: 'updatedDate', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false, required: false, hint: 'Optional — only fill if you update the post later' },
                { label: 'Thumbnail', name: 'heroImage', widget: 'image', required: false, media_folder: '/public/blog', public_folder: '/blog', hint: 'Cover image shown on cards and at the top of the post' },
                { label: 'Tags', name: 'tags', widget: 'list', required: false, hint: 'e.g. AI, Building, Python' },
                { label: 'Body', name: 'body', widget: 'markdown' },
              ],
            },
          ],
        },
      });
    </script>
  </body>
</html>
