backend:
  name: github
  repo: codereyinish/my-site
  branch: main
  base_url: https://my-site-gwgmbtkqo-manishs-projects-530c5920.vercel.app
  auth_endpoint: /api/auth

media_folder: public/blog
public_folder: /blog

collections:
  - name: blog
    label: Blog Posts
    label_singular: Blog Post
    folder: src/content/blog
    create: true
    delete: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    fields:
      - label: Title
        name: title
        widget: string
        hint: The post title — shown as the big heading

      - label: Description
        name: description
        widget: string
        hint: One-line summary shown on cards and in search results

      - label: Publish Date
        name: pubDate
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        default: ""

      - label: Updated Date
        name: updatedDate
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        required: false
        hint: Optional — only fill if you update the post later

      - label: Thumbnail
        name: heroImage
        widget: image
        required: false
        hint: Cover image shown on cards and at the top of the post. Upload here or skip for auto-generated.
        media_folder: /public/blog
        public_folder: /blog

      - label: Tags
        name: tags
        widget: list
        required: false
        hint: e.g. AI, Building, Python — used for filtering on the blog page

      - label: Body
        name: body
        widget: markdown
        hint: Your post content. Supports images, videos, code blocks, links.
